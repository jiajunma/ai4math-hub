<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-logo">AI4Math Hub</a>
      <nav class="site-nav">
        <a href="{{ '/papers/' | relative_url }}">Papers</a>
        <a href="{{ '/resources/' | relative_url }}">Resources</a>
        <a href="{{ site.github_url }}" target="_blank">GitHub</a>
      </nav>
    </div>
  </header>

  <main>{{ content }}</main>

  <footer class="site-footer">
    <div class="container">
      <p><a href="{{ site.github_url }}">Contribute on GitHub</a></p>
    </div>
  </footer>
</body>
</html>
