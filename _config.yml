title: AI4Math Hub
description: >-
  A curated resource hub for AI and Mathematics.
  Collecting AI4Math tools, OpenClaw Skills, courses, and educational materials.
  Open source and community-driven. Contributions welcome!
baseurl: ""
url: "https://jiajunma.github.io"
baseurl: "/ai4math-hub"
repository: jiajunma/ai4math-hub

# Author info
author:
  name: AI4Math Community
  email: contact@ai4math.org

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  tools:
    output: true
    permalink: /tools/:name/
  courses:
    output: true
    permalink: /courses/:name/
  skills:
    output: true
    permalink: /skills/:name/

# Default layouts
defaults:
  - scope:
      path: ""
      type: "tools"
    values:
      layout: item
  - scope:
      path: ""
      type: "courses"
    values:
      layout: item
  - scope:
      path: ""
      type: "skills"
    values:
      layout: item

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - vendor/
  - node_modules/

# Custom variables
github_url: https://github.com/jiajunma/ai4math-hub
discord_invite: https://discord.gg/ai4math

# Category configuration
categories:
  tools:
    - name: Formal Proof
      slug: formalization
    - name: Symbolic Computation
      slug: symbolic
    - name: Theorem Proving Assistance
      slug: theorem-proving
    - name: Mathematical Visualization
      slug: visualization
    - name: LaTeX Tools
      slug: latex
  skills:
    - name: OpenClaw Skills
      slug: openclaw
    - name: Claude/ChatGPT Skills
      slug: llm-skills
    - name: Prompt Engineering
      slug: prompt-engineering
  courses:
    - name: Lean Tutorials
      slug: lean
    - name: Formal Mathematics
      slug: formal-math
    - name: AI+Math Research
      slug: ai-math-research
