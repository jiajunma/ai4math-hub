title: AI4math 信息站
subtitle: AI4Math Hub
description: >-
  AI4math 信息站 - 人工智能与数学交叉领域的前沿信息平台。
  汇集最新研究论文、行业动态、初创公司和开源项目。
  The central hub for AI and Mathematics research.
url: "https://jiajunma.github.io"
baseurl: "/ai4math-hub"
repository: jiajunma/ai4math-hub

# Author info
author:
  name: AI4Math Community
  email: contact@ai4math.org

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  papers:
    output: true
    permalink: /:collection/:name/
  companies:
    output: true
    permalink: /:collection/:name/
  projects:
    output: true
    permalink: /:collection/:name/
  tools:
    output: true
    permalink: /:collection/:name/
  courses:
    output: true
    permalink: /:collection/:name/
  skills:
    output: true
    permalink: /:collection/:name/

# Default layouts
defaults:
  - scope:
      path: ""
      type: "papers"
    values:
      layout: item
  - scope:
      path: ""
      type: "companies"
    values:
      layout: item
  - scope:
      path: ""
      type: "projects"
    values:
      layout: item
  - scope:
      path: ""
      type: "tools"
    values:
      layout: item
  - scope:
      path: ""
      type: "courses"
    values:
      layout: item
  - scope:
      path: ""
      type: "skills"
    values:
      layout: item

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - vendor/
  - node_modules/

# Custom variables
github_url: https://github.com/jiajunma/ai4math-hub
discord_invite: https://discord.gg/ai4math

# Paper categories
paper_categories:
  - name: Automated Theorem Proving
    slug: atp
  - name: Neural Theorem Proving
    slug: ntp
  - name: Mathematical Reasoning
    slug: reasoning
  - name: Autoformalization
    slug: autoformalization
  - name: Formal Verification
    slug: verification
  - name: Math Education AI
    slug: education
  - name: Symbolic-Neural Hybrid
    slug: hybrid

# Company categories
company_categories:
  - name: AI Math Education
    slug: education
  - name: Theorem Proving
    slug: theorem-proving
  - name: Formal Verification
    slug: verification
  - name: Math Reasoning Engines
    slug: reasoning
  - name: Research Labs
    slug: research
